const map = L.map('map', {
 center: [50.8, 8.0],

 attributionControl: false

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
const markerMap = {};
const markersByType = { site: [], pending: [], tenant: [], operator: [] };
const activeFilters = { site: true, pending: true, tenant: true, operator: true };
function getMarkerType(loc, site) {
 if (loc.type === 'pop-tenant') return 'tenant';
 if (loc.type === 'pop-operator') return 'operator';
 if (site.status === 'pending') return 'pending';
 return 'site';
}
function toggleFilter(type) {
 activeFilters[type] = !activeFilters[type];
 const btn = document.querySelector(`.f-${type}`);
 btn.classList.toggle('active', activeFilters[type]);
 markersByType[type].forEach(marker => {
 if (activeFilters[type]) {
 marker.addTo(map);
 } else {
 marker.remove();
 }
 });
}
function buildPopup(loc) {
 const isPop = loc.type === 'pop-tenant' || loc.type === 'pop-operator';
 const popColor = loc.type === 'pop-operator' ? '#c060ff' : '#ff4444';
 const popLabel = loc.type === 'pop-operator' ? 'POP – OPERATOR' : 'POP – TENANT';
 const sitesHtml = loc.sites.map(s => `
 <div class="popup-site">
 <div class="popup-site-top">
 <span class="popup-site-id" style="${isPop ? `color:${popColor}` : ''}">${s.id}</span>
 <span class="popup-site-status" style="${s.status === 'pending' ? 'color:var(--orange)' : ''}">
 <span class="dot" style="${s.status === 'pending' ? 'background:var(--orange)' : ''}"></span>
 ${isPop ? popLabel : s.status === 'pending' ? 'Pending' : 'Active'}
 </span>
 </div>
 ${isPop ? `<div style="font-family:'DM Mono',monospace;font-size:9px;color:${popColor};letter-spacing:1px;margin-bottom:5px;">POINT OF PRESENCE</div>` : ''}
 <div class="popup-address">${s.address}</div>
 ${s.note ? `<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:4px;margin-bottom:6px;">📡 ${s.note}</div>` : ''}
 <div class="popup-carriers">
 ${s.carriers.length === 0 && !isPop ? `
 <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--orange);border:1px solid rgba(255,149,0,0.3);background:rgba(255,149,0,0.08);padding:6px 12px;border-radius:6px;letter-spacing:1px;">
 ⏳ SOON AVAILABLE
 </div>
 ` : s.carriers.map((c, i) => `
 <div class="carrier-wrap">
 <span class="carrier-pill carrier-${i === 0 ? 'a' : 'b'} carrier-clickable" tabindex="0">
 ⬡ ${c.label} <span class="carrier-arrow">›</span>
 </span>
 <div class="carrier-tooltip">
 <span class="tooltip-label">${c.label}</span>
 ${c.entries.map(e => `
 <div class="tooltip-entry">
 <div class="tooltip-entry-header">
 <span class="tooltip-name">${e.name}</span>
 ${e.services.length > 0 ? `<span class="tooltip-entry-arrow">›</span>` : ''}
 </div>
 ${e.services.length > 0 ? `
 <div class="tooltip-services">
 ${e.services.map(sv => `<span class="tooltip-service">${expandSvc(sv)}</span>`).join('')}
 </div>` : ''}
 </div>
 `).join('')}
 </div>
 </div>
 `).join('')}
 </div>
 </div>
 `).join('');
 return `
 <div class="popup-inner">
 <div class="popup-country">${loc.country}</div>
 <div class="popup-city">${loc.city}</div>
 <div class="popup-sites">${sitesHtml}</div>
 </div>
 `;
}
LOCATIONS.forEach(loc => {
 const isPop = loc.type === 'pop-tenant' || loc.type === 'pop-operator';
 const activeSites = loc.sites.filter(s => s.status !== 'pending');
 const pendingSites = loc.sites.filter(s => s.status === 'pending');
 function createMarker(sites, lat, lng, markerType, offset) {
 const isMulti = sites.length > 1;
 const markerClass = isPop ? loc.type : (isMulti ? 'multi' : markerType === 'pending' ? 'pending' : '');
 const labelClass = markerClass;
 const labelText = sites.map(s => s.id).join(' · ');
 const outerStyle = markerType === 'pending'
 ? 'background:rgba(255,149,0,0.1);border-color:rgba(255,149,0,0.4);'
 : '';
 const innerStyle = markerType === 'pending'
 ? 'background:linear-gradient(135deg,#cc6600,var(--orange));box-shadow:0 0 10px rgba(255,149,0,0.7);'
 : '';
 const labelStyle = markerType === 'pending'
 ? 'color:var(--orange);border-color:rgba(255,149,0,0.3);'
 : '';
 const iconHtml = `
 <div class="atlas-marker">
 <div class="marker-outer ${markerClass}" style="${outerStyle}">
 <div class="marker-inner" style="${innerStyle}"></div>
 </div>
 <div class="marker-label ${labelClass}" style="${labelStyle}">${labelText}</div>
 </div>
 `;
 const icon = L.divIcon({
 html: iconHtml,
 className: '',
 iconSize: [36, 36],
 iconAnchor: [18, 18],
 popupAnchor: [0, -26]
 });
 const miniLoc = { ...loc, sites };
 const marker = L.marker([lat + (offset || 0), lng], { icon })
 .addTo(map)
 .bindPopup(buildPopup(miniLoc), { maxWidth: 300, closeButton: true });
 sites.forEach(s => {
 markerMap[s.id] = { marker, loc: miniLoc };
 });
 const filterType = isPop
 ? (loc.type === 'pop-operator' ? 'operator' : 'tenant')
 : markerType;
 if (!markersByType[filterType].includes(marker)) {
 markersByType[filterType].push(marker);
 }
 }
 if (activeSites.length > 0) {
 createMarker(activeSites, loc.lat, loc.lng, 'site', 0);
 }
 if (pendingSites.length > 0) {
 createMarker(pendingSites, loc.lat, loc.lng, 'pending', activeSites.length > 0 ? 0.008 : 0);
 }
});
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const clearBtn = document.getElementById('clearBtn');
function doSearch(val) {
 const q = val.trim().toLowerCase();
 clearBtn.classList.toggle('visible', q.length > 0);
 if (q.length < 1) {
 searchResults.classList.remove('visible');
 searchResults.innerHTML = '';
 return;
 }
 const hits = [];
 LOCATIONS.forEach(loc => {
 loc.sites.forEach(site => {
 const cityMatch = loc.city.toLowerCase().includes(q);
 const idMatch = site.id.toLowerCase().includes(q);
 const carrierMatches = [];
 if (q.length >= 4) {
 site.carriers.forEach(c => {
 c.entries.forEach(e => {
 const nameMatch = e.name.toLowerCase().includes(q);
 const serviceMatch = e.services.some(sv => expandSvc(sv).toLowerCase().includes(q));
 if (nameMatch || serviceMatch) {
 carrierMatches.push({ carrier: c, entry: e });
 }
 });
 });
 }
 if (idMatch || cityMatch) {
 hits.push({ type: 'site', loc, site, label: site.id, sub: loc.city + ' · ' + site.address });
 }
 carrierMatches.forEach(({ entry }) => {
 hits.push({ type: 'carrier', loc, site, label: entry.name, sub: site.id + ' · ' + loc.city });
 });
 });
 });
 const seen = new Set();
 const unique = hits.filter(h => {
 const key = h.label + h.site.id;
 if (seen.has(key)) return false;
 seen.add(key);
 return true;
 });
 if (unique.length === 0) {
 searchResults.innerHTML = '<div class="no-results-msg">No results found</div>';
 } else {
 searchResults.innerHTML = unique.map((h, i) => `
 <div class="search-result-item" data-idx="${i}">
 <div class="result-icon ${h.type === 'carrier' ? 'carrier-match' : ''}">
 ${h.type === 'carrier' ? '⬡' : '◎'}
 </div>
 <div class="result-text">
 <div class="result-id ${h.type === 'carrier' ? 'carrier-match' : ''}">${h.label}</div>
 <div class="result-sub">${h.sub}</div>
 </div>
 </div>
 `).join('');
 searchResults.querySelectorAll('.search-result-item').forEach((el, i) => {
 el.addEventListener('click', () => {
 const h = unique[i];
 map.setView([h.loc.lat, h.loc.lng], 13, { animate: true });
 const entry = markerMap[h.site.id];
 if (entry) entry.marker.openPopup();
 searchResults.classList.remove('visible');
 searchInput.value = h.type === 'carrier' ? h.label : h.site.id;
 });
 });
 }
 searchResults.classList.add('visible');
}
searchInput.addEventListener('input', e => doSearch(e.target.value));
searchInput.addEventListener('focus', e => { if (e.target.value) doSearch(e.target.value); });
clearBtn.addEventListener('click', () => {
 searchInput.value = '';
 clearBtn.classList.remove('visible');
 searchResults.classList.remove('visible');
 searchResults.innerHTML = '';
 searchInput.focus();
});
document.addEventListener('click', e => {
 if (!e.target.closest('.search-box')) {
 searchResults.classList.remove('visible');
 }
});
document.addEventListener('click', e => {
 const entryHeader = e.target.closest('.tooltip-entry-header');
 if (entryHeader) {
 const entry = entryHeader.closest('.tooltip-entry');
 entry.classList.toggle('entry-open');
 e.stopPropagation();
 return;
 }
 const pill = e.target.closest('.carrier-clickable');
 if (pill) {
 const wrap = pill.closest('.carrier-wrap');
 const isOpen = wrap.classList.contains('open');
 document.querySelectorAll('.carrier-wrap.open').forEach(w => {
 w.classList.remove('open');
 w.querySelectorAll('.tooltip-entry.entry-open').forEach(en => en.classList.remove('entry-open'));
 });
 if (!isOpen) wrap.classList.add('open');
 e.stopPropagation();
 return;
 }
 if (!e.target.closest('.carrier-tooltip')) {
 document.querySelectorAll('.carrier-wrap.open').forEach(w => {
 w.classList.remove('open');
 w.querySelectorAll('.tooltip-entry.entry-open').forEach(en => en.classList.remove('entry-open'));
 });
 }
